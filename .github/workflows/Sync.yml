name: Sync
on:
  workflow_dispatch:
    inputs:
      r1: { description: "owner/repo|save_path|tag", required: false, type: string }
      r2: { description: "owner/repo|save_path|tag", required: false, type: string }
      r3: { description: "owner/repo|save_path|tag", required: false, type: string }
      r4: { description: "owner/repo|save_path|tag", required: false, type: string }
      r5: { description: "owner/repo|save_path|tag", required: false, type: string }
      r6: { description: "owner/repo|save_path|tag", required: false, type: string }
      r7: { description: "owner/repo|save_path|tag", required: false, type: string }
      r8: { description: "owner/repo|save_path|tag", required: false, type: string }
      r9: { description: "owner/repo|save_path|tag", required: false, type: string }

permissions: { contents: write }

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0, token: "${{ secrets.GITHUB_TOKEN }}" }
    - run: |
        git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com" && git pull --rebase origin main || true
        dl() ( local r d t; IFS='|' read r d t <<< "$1"; [ -z "$r" ] || [ -z "$d" ] && return; echo "→ $r | $d | ${t:-latest}"; rm -rf "packages/$d" && mkdir -p "packages/$d" && cd "packages/$d"; local api="https://api.github.com/repos/$r/releases/$([ -z "$t" ] && echo "latest" || echo "tags/$t")"; curl -sS -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$api" | jq -r '.assets[]?|select(.name|test("ipk|apk|tar.gz";"i"))|.browser_download_url//empty' | while read u; do [ -n "$u" ] && curl -fLS -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -o "$(basename "$u")" "$u"; done )
        for cfg in "${{ inputs.r1 }}" "${{ inputs.r2 }}" "${{ inputs.r3 }}" "${{ inputs.r4 }}" "${{ inputs.r5 }}" "${{ inputs.r6 }}" "${{ inputs.r7 }}" "${{ inputs.r8 }}" "${{ inputs.r9 }}"; do dl "$cfg"; done
        git add -f packages/ && git diff --staged --quiet || { git commit -m "$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')" && git push --force-with-lease origin HEAD; }
        